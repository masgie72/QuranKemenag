<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quran Kemenag & Jadwal Shalat</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://picsum.photos/192">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Roboto:wght@300;400;500;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            roboto: ['Roboto', 'sans-serif'],
            lora: ['Lora', 'serif'],
            arabic: ['Amiri', 'serif'],
            scheherazade: ['"Scheherazade New"', 'serif'],
            notonaskh: ['"Noto Naskh Arabic"', 'serif'],
          },
          colors: {
            primary: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .arabic-text { line-height: 2.5; }
    /* Hide scrollbar for clean UI but keep functionality */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Islamic Geometric Pattern */
    .bg-pattern-islamic {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M30 15L20 5h-5l10 10v10l-10 10v5l10-10 10 10h5L30 25V15zM15 30L5 20v-5l10 10h10L15 15h-5l10 10H15zM45 30l10-10v-5L45 25H35l10-10h5L40 15v10l10 10zM30 45l10 10h5L35 45V35l10-10v-5L35 30 25 40v5l10-10v10z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .dark .bg-pattern-islamic {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.2'%3E%3Cpath d='M30 15L20 5h-5l10 10v10l-10 10v5l10-10 10 10h5L30 25V15zM15 30L5 20v-5l10 10h10L15 15h-5l10 10H15zM45 30l10-10v-5L45 25H35l10-10h5L40 15v10l10 10zM30 45l10 10h5L35 45V35l10-10v-5L35 30 25 40v5l10-10v10z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Tajweed Colors - Standar Mushaf Kemenag RI */
    tajweed.ghunnah { color: #ec4899 !important; } /* Pink: Ghunnah */
    tajweed.idgham_ma_al_ghunnah, tajweed.idgham_bila_ghunnah, tajweed.idgham_mutajanisayn, tajweed.idgham_mutaqaribayn { color: #ef4444 !important; } /* Merah: Idgham */
    tajweed.ikhfa, tajweed.ikhfa_shafawi, tajweed.iqlab { color: #22c55e !important; } /* Hijau: Ikhfa & Iqlab */
    tajweed.madd_2, tajweed.madd_4, tajweed.madd_6, tajweed.madd_246, tajweed.madd_muttasil, tajweed.madd_munfasil, tajweed.madd_lazim, tajweed[class^="madd_"] { color: #3b82f6 !important; } /* Biru: Mad */
    tajweed.qalqalah { color: #06b6d4 !important; } /* Biru Muda / Cyan: Qalqalah */
    tajweed.hamzat_wasl, tajweed.slnt { color: #9ca3af !important; } /* Abu-abu: Tidak dibaca / Gugur */
  </style>
  </head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
<script type="module" src="/index.js"></script></body>
</html>
